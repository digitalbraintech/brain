name: ci

on:
  pull_request:
  push:
    branches-ignore: [master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'

      # Build + run via the test project so CI restores only its dependency graph. Brain.slnx pulls in
      # ../app/Flutter.proj (the sibling app repo), which isn't checked out in headless CI, so building the whole
      # solution can't work on a runner. The test project covers every .NET project under test.
      # E2E specs need the full Aspire stack (Ollama + replicas) + Playwright and are gated out of headless CI,
      # mirroring the documented "DigitalBrain.Tests excluding gated E2E" verification.
      - run: dotnet test DigitalBrain.Tests/DigitalBrain.Tests.csproj -c Release --filter "FullyQualifiedName!~E2E"
